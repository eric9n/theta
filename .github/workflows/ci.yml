name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run tests
        run: cargo test --workspace

      - name: Build release binaries
        run: cargo build --workspace --release

      - name: Prepare release bundle
        run: |
          mkdir -p dist/bin dist/deploy dist/scripts
          cp target/release/theta dist/bin/
          cp target/release/theta-daemon dist/bin/
          cp target/release/theta-mcp dist/bin/
          printf '%s\n' 'dev' > dist/VERSION
          cp README.md dist/
          cp deploy/*.service dist/deploy/
          cp deploy/*.sh dist/deploy/
          cp scripts/theta.sh dist/scripts/
          cp -R skills dist/
          chmod +x dist/deploy/*.sh
          chmod +x dist/scripts/theta.sh
          tar -czf theta-linux-x86_64.tar.gz -C dist .

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: theta-linux-x86_64
          path: theta-linux-x86_64.tar.gz
          if-no-files-found: error
