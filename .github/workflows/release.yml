name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  ARCHIVE_NAME: theta-linux-x86_64

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

      - name: Build release binaries
        run: cargo build --workspace --release

      - name: Prepare release bundle
        run: |
          mkdir -p dist/bin dist/deploy
          cp target/release/theta dist/bin/
          cp target/release/theta-daemon dist/bin/
          printf '%s\n' '${{ github.ref_name }}' > dist/VERSION
          cp README.md dist/
          cp deploy/*.service dist/deploy/
          cp deploy/*.sh dist/deploy/
          cp -R deploy/taskd dist/deploy/
          cp -R skills dist/
          chmod +x dist/deploy/*.sh dist/deploy/taskd/*.sh
          tar -czf "${ARCHIVE_NAME}.tar.gz" -C dist .
          sha256sum "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: |
            ${{ env.ARCHIVE_NAME }}.tar.gz
            ${{ env.ARCHIVE_NAME }}.tar.gz.sha256
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ARCHIVE_NAME }}.tar.gz
            ${{ env.ARCHIVE_NAME }}.tar.gz.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
